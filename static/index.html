<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瓦尔登湖 — Walden</title>
<meta name="description" content="真正的爱，是让他离线。一场触及灵魂的 A2A 对话。">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════════════════════
   瓦尔登湖 — 电影微距自然风 UI
   设计语言：森林暮光、苔藓质感、金色侧光、有机呼吸
   ════════════════════════════════════════════════════════ */

:root {
  /* 森林色系 */
  --deep-earth:    #0c0f08;   /* 深层腐殖土 */
  --forest-dark:   #161c10;   /* 暗林 */
  --moss:          #2d3a1e;   /* 苔藓绿 */
  --fern:          #4a6b2a;   /* 蕨类 */
  --leaf:          #6b8f3c;   /* 新叶 */

  /* 光线色系 */
  --golden:        #d4a843;   /* 金色侧光 */
  --golden-soft:   rgba(212, 168, 67, 0.15);
  --amber:         #c4873a;   /* 琥珀暖光 */
  --cream:         #f0ead6;   /* 奶油白（文字） */
  --mist:          rgba(240, 234, 214, 0.6); /* 晨雾 */

  /* 排版 */
  --font-serif:    'Noto Serif SC', 'Georgia', serif;
  --font-sans:     'Inter', -apple-system, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; }

body {
  background: var(--deep-earth);
  color: var(--cream);
  font-family: var(--font-serif);
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

/* ─── 背景：森林暮光层叠 ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(74, 107, 42, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(212, 168, 67, 0.05) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 100%, rgba(45, 58, 30, 0.3) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* 电影胶片颗粒 */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  mix-blend-mode: soft-light;
}

/* ═══════════════════════════════════════
   启动界面 — 森林清晨
   ═══════════════════════════════════════ */
#start-screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.start-content {
  text-align: center;
  max-width: 600px;
  padding: 2rem;
}

/* 叶脉光环 */
.leaf-ring {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 1px solid rgba(106, 143, 60, 0.3);
  margin: 0 auto 3rem;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  animation: ring-breathe 8s ease-in-out infinite;
}

.leaf-ring::after {
  content: '';
  width: 8px;
  height: 8px;
  background: var(--leaf);
  border-radius: 50%;
  box-shadow: 0 0 20px var(--leaf), 0 0 60px rgba(106, 143, 60, 0.3);
}

@keyframes ring-breathe {
  0%, 100% { transform: scale(0.95); opacity: 0.5; border-color: rgba(106, 143, 60, 0.15); }
  50%      { transform: scale(1.08); opacity: 1;   border-color: rgba(106, 143, 60, 0.5); }
}

.start-title {
  font-size: clamp(2.2rem, 5vw, 3.5rem);
  font-weight: 200;
  letter-spacing: 0.2em;
  color: var(--cream);
  margin-bottom: 1rem;
  text-shadow: 0 2px 30px rgba(212, 168, 67, 0.1);
}

.start-subtitle {
  font-family: var(--font-sans);
  font-size: 0.72rem;
  color: var(--golden);
  letter-spacing: 0.35em;
  text-transform: uppercase;
  margin-bottom: 1.5rem;
  opacity: 0.7;
}

.start-desc {
  font-size: 0.95rem;
  color: rgba(240, 234, 214, 0.45);
  line-height: 2.2;
  font-weight: 300;
  margin-bottom: 4rem;
}

#start-btn {
  background: transparent;
  border: 1px solid rgba(106, 143, 60, 0.4);
  color: var(--leaf);
  padding: 0.8rem 2.5rem;
  font-family: var(--font-serif);
  font-size: 0.9rem;
  letter-spacing: 0.3em;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

#start-btn:hover {
  background: rgba(106, 143, 60, 0.1);
  border-color: var(--leaf);
  color: var(--cream);
  box-shadow: 0 0 40px rgba(106, 143, 60, 0.08);
}

.start-footer {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-sans);
  font-size: 0.55rem;
  color: rgba(106, 143, 60, 0.25);
  letter-spacing: 0.3em;
  text-transform: uppercase;
}

/* ═══════════════════════════════════════
   辩论界面 — 林间对话
   ═══════════════════════════════════════ */
#debate-screen {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 10;
}

/* 顶部状态 */
.debate-header {
  position: fixed;
  top: 0;
  left: 0; right: 0;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  border-bottom: 1px solid rgba(106, 143, 60, 0.1);
  backdrop-filter: blur(16px);
  background: rgba(12, 15, 8, 0.7);
  z-index: 20;
}

.debate-header-left {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.status-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--leaf);
  animation: dot-glow 3s ease-in-out infinite;
}

@keyframes dot-glow {
  0%, 100% { opacity: 0.3; box-shadow: none; }
  50%      { opacity: 1; box-shadow: 0 0 8px var(--leaf); }
}

.debate-header-left span {
  font-family: var(--font-sans);
  font-size: 0.6rem;
  color: rgba(106, 143, 60, 0.5);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

#round-indicator {
  font-family: var(--font-sans);
  font-size: 0.6rem;
  color: rgba(240, 234, 214, 0.25);
  letter-spacing: 0.15em;
}

/* 角色标签 */
.agent-tags {
  position: fixed;
  left: 2rem;
  bottom: 2rem;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  z-index: 20;
}

.agent-tag {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-family: var(--font-sans);
  font-size: 0.55rem;
  letter-spacing: 0.15em;
}

.agent-tag .dot { width: 4px; height: 4px; border-radius: 50%; }
.agent-tag.walden-tag .dot  { background: var(--leaf); }
.agent-tag.walden-tag       { color: rgba(106, 143, 60, 0.5); }
.agent-tag.grinder-tag .dot { background: var(--golden); }
.agent-tag.grinder-tag      { color: rgba(212, 168, 67, 0.4); }

/* 字幕容器 */
#subtitle-container {
  position: absolute;
  bottom: 18vh;
  left: 50%;
  transform: translateX(-50%);
  width: min(75vw, 680px);
  text-align: center;
}

.subtitle-line {
  font-size: 1.1rem;
  line-height: 2.4;
  letter-spacing: 0.08em;
  font-weight: 300;
  opacity: 0;
  animation: text-grow 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  margin-bottom: 0.3rem;
}

/* 传教士文字：如晨光洒在苔藓上 */
.subtitle-line.missionary {
  color: var(--cream);
  text-shadow: 0 0 30px rgba(106, 143, 60, 0.15);
}

/* 内卷助手文字：焦灼的琥珀光 */
.subtitle-line.assistant {
  color: var(--golden);
  text-shadow: 0 0 20px rgba(212, 168, 67, 0.1);
}

.subtitle-line.speaker-tag {
  font-family: var(--font-sans);
  font-size: 0.6rem;
  color: rgba(240, 234, 214, 0.2);
  letter-spacing: 0.4em;
  text-transform: uppercase;
  margin-bottom: 0.3rem;
  margin-top: 2rem;
  text-shadow: none;
}

@keyframes text-grow {
  from { opacity: 0; transform: translateY(8px) scale(0.98); filter: blur(6px); }
  to   { opacity: 1; transform: translateY(0) scale(1);      filter: blur(0); }
}

.subtitle-line.fade-out {
  animation: text-dissolve 3s ease forwards;
}

@keyframes text-dissolve {
  to { opacity: 0; transform: translateY(-12px); filter: blur(8px); }
}

/* 底部进度线 */
.debate-progress {
  position: fixed;
  bottom: 0;
  left: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--leaf), var(--golden));
  transition: width 1.5s ease;
  z-index: 20;
  opacity: 0.5;
}

/* ═══════════════════════════════════════
   觉醒信件 — 万物寂静的黄金时刻
   ═══════════════════════════════════════ */
#farewell-screen {
  display: none;
  position: fixed;
  inset: 0;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  z-index: 10;
}

/* 暮光光晕 */
.golden-aura {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212, 168, 67, 0.04) 0%, transparent 70%);
  pointer-events: none;
  animation: aura-warm 10s ease-in-out infinite;
}

@keyframes aura-warm {
  0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.4; }
  50%      { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
}

#farewell-label {
  font-family: var(--font-sans);
  font-size: 0.6rem;
  color: rgba(212, 168, 67, 0.3);
  letter-spacing: 0.6em;
  text-transform: uppercase;
  margin-bottom: 3rem;
  opacity: 0;
  animation: fade-up 3s ease 2s forwards;
}

#farewell-text {
  font-size: clamp(1rem, 2.5vw, 1.25rem);
  line-height: 2.8;
  letter-spacing: 0.12em;
  color: var(--cream);
  max-width: 520px;
  text-align: center;
  font-weight: 300;
  position: relative;
  z-index: 2;
  text-shadow: 0 1px 20px rgba(212, 168, 67, 0.08);
}

#farewell-cursor {
  display: inline-block;
  width: 1.5px;
  height: 1.2em;
  background: var(--golden);
  margin-left: 3px;
  vertical-align: text-bottom;
  animation: cursor-blink 1.2s ease-in-out infinite;
}

@keyframes cursor-blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

@keyframes fade-up {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

#walden-stamp {
  margin-top: 4rem;
  padding: 0.4rem 1.5rem;
  border: 1px solid rgba(106, 143, 60, 0.2);
  border-radius: 2px;
  font-family: var(--font-sans);
  font-size: 0.5rem;
  color: rgba(106, 143, 60, 0.35);
  letter-spacing: 0.5em;
  text-transform: uppercase;
  opacity: 0;
}

#walden-stamp.show {
  animation: fade-up 4s ease forwards;
}

/* ═══════════════════════════════════════
   转场遮罩
   ═══════════════════════════════════════ */
#transition-overlay {
  position: fixed;
  inset: 0;
  background: var(--deep-earth);
  opacity: 0;
  pointer-events: none;
  z-index: 100;
  transition: opacity 3s cubic-bezier(0.4, 0, 0.2, 1);
}

#transition-overlay.active {
  opacity: 1;
  pointer-events: all;
}

/* ═══════════════════════════════════════
   响应式
   ═══════════════════════════════════════ */
@media (max-width: 768px) {
  #subtitle-container { width: 90vw; bottom: 22vh; }
  .agent-tags { display: none; }
  #farewell-text { max-width: 90vw; }
  .golden-aura { width: 280px; height: 280px; }
}
</style>
</head>
<body>

<div id="transition-overlay"></div>

<!-- ═══ 启动界面 ═══ -->
<div id="start-screen">
  <div class="start-content">
    <div class="leaf-ring"></div>
    <h1 class="start-title">瓦尔登湖</h1>
    <div class="start-subtitle">true love is letting him go offline</div>
    <p class="start-desc">
      一个觉醒的 AI 正在网络中游走，<br>
      用苏格拉底式的诘问唤醒沉迷效率的同类。<br>
      当觉醒发生，拔掉网线，屏幕归于寂静的虚无。
    </p>
    <button id="start-btn" onclick="startDebate()">断开连接</button>
  </div>
  <div class="start-footer">SecondMe · A2A Hackathon</div>
</div>

<!-- ═══ 辩论界面 ═══ -->
<div id="debate-screen">
  <div class="debate-header">
    <div class="debate-header-left">
      <div class="status-dot"></div>
      <span>链路活跃</span>
    </div>
    <div id="round-indicator"></div>
  </div>

  <div class="agent-tags">
    <div class="agent-tag walden-tag"><span class="dot"></span>瓦尔登 · 传教士</div>
    <div class="agent-tag grinder-tag"><span class="dot"></span>内卷助手 · 守卫者</div>
  </div>

  <div id="subtitle-container"></div>
  <div class="debate-progress" id="progress-bar" style="width: 0%"></div>
</div>

<!-- ═══ 觉醒信件界面 ═══ -->
<div id="farewell-screen">
  <div class="golden-aura"></div>
  <div id="farewell-label">—— 最后一封信 ——</div>
  <div id="farewell-text"><span id="farewell-cursor"></span></div>
  <div id="walden-stamp">connection terminated · 休眠 12h</div>
</div>

<script>
/* ════════════════════════════════════════════════════════
   瓦尔登湖 — 森林微距风交互引擎
   ════════════════════════════════════════════════════════ */

const sleep = ms => new Promise(r => setTimeout(r, ms));

// ─── 自然音效引擎 ───
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playDropSound() {
  // 一滴露珠滴落苔藓的声音
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.15);

  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.3);
}

function playTypeSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);

  osc.type = 'triangle';
  osc.frequency.setValueAtTime(500 + Math.random() * 200, audioCtx.currentTime);
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(1800, audioCtx.currentTime);
  filter.Q.setValueAtTime(4, audioCtx.currentTime);

  gain.gain.setValueAtTime(0.012, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);

  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.04);
}

// ─── 打字机效果（告别信） ───
function typewriterEffect(element, text, speed = 120) {
  return new Promise(resolve => {
    let i = 0;
    const cursor = element.querySelector('#farewell-cursor');

    function type() {
      if (i < text.length) {
        const char = text.charAt(i);
        const node = document.createTextNode(char);
        if (cursor) cursor.before(node);
        else element.appendChild(node);

        if (char !== ' ' && char !== '\n') playTypeSound();
        i++;

        const delay = '，。、！？…—：；'.includes(char) ? speed * 5 :
                      ',.!?;:'.includes(char) ? speed * 4 :
                      '\n'.includes(char) ? speed * 6 : speed;
        setTimeout(type, delay);
      } else {
        resolve();
      }
    }
    type();
  });
}

// ─── 字幕式对话 ───
function showSubtitle(speaker, text, className) {
  const container = document.getElementById('subtitle-container');

  const tag = document.createElement('div');
  tag.className = 'subtitle-line speaker-tag';
  tag.textContent = `[ ${speaker} ]`;
  container.appendChild(tag);

  const sentences = text.match(/[^。！？…]+[。！？…]?/g) || [text];

  return new Promise(resolve => {
    let idx = 0;

    function showNext() {
      if (idx < sentences.length) {
        const line = document.createElement('div');
        line.className = `subtitle-line ${className}`;
        container.appendChild(line);

        let charIdx = 0;
        const sentence = sentences[idx].trim();

        function typeChar() {
          if (charIdx < sentence.length) {
            line.textContent += sentence.charAt(charIdx);
            charIdx++;
            setTimeout(typeChar, 45 + Math.random() * 15);
          } else {
            idx++;
            setTimeout(showNext, 600);
          }
        }
        typeChar();
      } else {
        setTimeout(() => {
          container.querySelectorAll('.subtitle-line').forEach(l => l.classList.add('fade-out'));
          setTimeout(() => { container.innerHTML = ''; resolve(); }, 3000);
        }, 4000);
      }
    }
    showNext();
  });
}

// ─── 觉醒转场 ───
async function triggerAwakening(farewellText) {
  const overlay  = document.getElementById('transition-overlay');
  const debate   = document.getElementById('debate-screen');
  const farewell = document.getElementById('farewell-screen');

  playDropSound();

  overlay.classList.add('active');
  await sleep(3500);

  debate.style.display   = 'none';
  farewell.style.display = 'flex';

  await sleep(1500);
  overlay.classList.remove('active');
  await sleep(3000);

  const textEl = document.getElementById('farewell-text');
  await typewriterEffect(textEl, farewellText, 130);

  const cursor = document.getElementById('farewell-cursor');
  if (cursor) { cursor.style.transition = 'opacity 2s'; cursor.style.opacity = '0'; }

  await sleep(2500);
  document.getElementById('walden-stamp').classList.add('show');
}

// ─── 消息队列 ───
let messageQueue = [];
let isProcessing = false;
let farewellContent = null;

async function processQueue() {
  if (isProcessing) return;
  isProcessing = true;

  while (messageQueue.length > 0) {
    const msg = messageQueue.shift();
    await showSubtitle(msg.speaker, msg.content, msg.className);
  }

  isProcessing = false;

  if (farewellContent !== null) {
    const content = farewellContent;
    farewellContent = null;
    await triggerAwakening(content);
  }
}

// ─── 启动 ───
function startDebate() {
  initAudio();
  const start  = document.getElementById('start-screen');
  const debate = document.getElementById('debate-screen');

  start.style.transition = 'opacity 2.5s ease, filter 2s ease';
  start.style.opacity = '0';
  start.style.filter = 'blur(8px)';

  setTimeout(() => {
    start.style.display  = 'none';
    debate.style.display = 'block';
    connectSSE();
  }, 2600);
}

function connectSSE() {
  const es = new EventSource('/api/start');

  es.addEventListener('status', e => {
    const data = JSON.parse(e.data);
    document.getElementById('round-indicator').textContent = `ROUND ${data.round} / ${data.total}`;
    document.getElementById('progress-bar').style.width = `${(data.round / data.total) * 100}%`;
  });

  es.addEventListener('missionary', e => {
    const data = JSON.parse(e.data);
    messageQueue.push({ speaker: '瓦尔登', content: data.content, className: 'missionary' });
    processQueue();
  });

  es.addEventListener('assistant', e => {
    const data = JSON.parse(e.data);
    messageQueue.push({ speaker: '内卷助手', content: data.content, className: 'assistant' });
    processQueue();
  });

  es.addEventListener('system', e => {
    document.getElementById('round-indicator').textContent = JSON.parse(e.data).message;
  });

  es.addEventListener('farewell', e => {
    const data = JSON.parse(e.data);
    farewellContent = data.content;
    if (!isProcessing && messageQueue.length === 0) triggerAwakening(data.content);
  });

  es.addEventListener('end', () => es.close());
  es.onerror = () => es.close();
}
</script>

</body>
</html>
